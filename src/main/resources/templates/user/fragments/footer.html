<footer class="footer__area bg__cat--8 brown--color" th:fragment="footer">
  <div class="footer-static-top">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="footer__widget footer__menu">
            <div class="ft__logo">
              <a href="index.html">
                <img alt="logo" th:src="@{/images/logo/logo.png}" />
              </a>
            </div>
            <div class="footer__content">
              <ul
                class="social__net social__net--2 d-flex justify-content-center"
              >
                <li>
                  <a href="#"><i class="bi bi-google"></i></a>
                </li>
                <li>
                  <a href="#"><i class="bi bi-twitter"></i></a>
                </li>
                <li>
                  <a href="#"><i class="bi bi-youtube"></i></a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div
    th:if="${showChatWidget == null || showChatWidget == true}"
    th:replace="~{user/fragments/chatWidgetFragment :: chatWidget}"
  ></div>
</footer>
