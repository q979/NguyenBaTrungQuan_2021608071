<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
      name="viewport"
    />
    <title>Quản lý bài viết - HTX Dương Hòa</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script
      crossorigin="anonymous"
      th:src="@{/js/admin/fontawesome-all.js}"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Be Vietnam Pro", sans-serif;
      }

      .page-content {
        padding: 28px;
        animation: fadeSlideUp 0.4s ease both;
      }
      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== PAGE HEADER ===== */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .page-header__left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .page-header__icon {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 20px;
      }
      .page-header__title {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
      }
      .page-header__sub {
        font-size: 13px;
        color: #94a3b8;
      }

      /* ===== ALERT ===== */
      .alert-custom {
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .alert-custom--success {
        background: linear-gradient(135deg, #d1fae5, #a7f3d0);
        border: 1px solid #6ee7b7;
        color: #065f46;
      }
      .alert-custom--danger {
        background: linear-gradient(135deg, #fee2e2, #fecaca);
        border: 1px solid #fca5a5;
        color: #991b1b;
      }

      /* ===== ADD BUTTON ===== */
      .btn-add {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 22px;
        border-radius: 25px;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: #fff;
        box-shadow: 0 4px 14px rgba(245, 158, 11, 0.35);
        transition: all 0.25s ease;
      }
      .btn-add:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
        color: #fff;
      }

      /* ===== FILTER BAR ===== */
      .filter-bar {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        padding: 20px 24px;
        margin-bottom: 24px;
        display: flex;
        gap: 14px;
        align-items: flex-end;
        flex-wrap: wrap;
      }
      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 180px;
      }
      .filter-label {
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .filter-input,
      .filter-select {
        padding: 10px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 13px;
        font-family: "Be Vietnam Pro", sans-serif;
        color: #334155;
        background: #f8fafc;
        outline: none;
        transition: border-color 0.2s ease;
      }
      .filter-input:focus,
      .filter-select:focus {
        border-color: #f59e0b;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
      }
      .btn-search {
        padding: 10px 22px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: "Be Vietnam Pro", sans-serif;
        box-shadow: 0 3px 12px rgba(245, 158, 11, 0.3);
        transition: all 0.25s ease;
        white-space: nowrap;
      }
      .btn-search:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 18px rgba(245, 158, 11, 0.4);
      }

      /* ===== CARD ===== */
      .admin-card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        overflow: hidden;
        transition: box-shadow 0.3s ease;
      }
      .admin-card:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      }

      /* ===== TABLE ===== */
      .admin-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
      }
      .admin-table thead tr {
        background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      }
      .admin-table thead th {
        padding: 13px 16px;
        text-align: left;
        font-weight: 600;
        color: #64748b;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        border-bottom: 2px solid #e2e8f0;
        white-space: nowrap;
      }
      .admin-table tbody tr {
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.15s ease;
      }
      .admin-table tbody tr:last-child {
        border-bottom: none;
      }
      .admin-table tbody tr:hover {
        background: #f8fffe;
      }
      .admin-table tbody td {
        padding: 14px 16px;
        color: #475569;
        vertical-align: middle;
      }
      .admin-table tbody td:first-child {
        font-weight: 600;
        color: #94a3b8;
        font-size: 12px;
      }

      /* ===== THUMBNAIL ===== */
      .blog-thumb {
        width: 80px;
        height: 60px;
        border-radius: 10px;
        object-fit: cover;
        border: 1px solid #e2e8f0;
      }

      /* ===== ACTION BUTTONS ===== */
      .action-btns {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn-action {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        font-family: "Be Vietnam Pro", sans-serif;
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.25s ease;
      }
      .btn-action--edit {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: #fff;
        box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
      }
      .btn-action--edit:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        color: #fff;
      }
      .btn-action--delete {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: #fff;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
      }
      .btn-action--delete:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
        color: #fff;
      }

      /* ===== EMPTY STATE ===== */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #94a3b8;
      }
      .empty-state__icon {
        font-size: 48px;
        margin-bottom: 12px;
        color: #cbd5e1;
      }
      .empty-state__text {
        font-size: 15px;
        font-weight: 500;
      }

      /* ===== PAGINATION ===== */
      .pagination-custom {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        padding: 20px 16px;
        flex-wrap: wrap;
      }
      .pagination-custom a,
      .pagination-custom span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 36px;
        height: 36px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.2s ease;
        font-family: "Be Vietnam Pro", sans-serif;
      }
      .pagination-custom a:hover {
        background: #f59e0b;
        color: #fff;
        border-color: #f59e0b;
        transform: translateY(-1px);
      }
      .pagination-custom .active {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: #fff;
        border-color: #f59e0b;
        box-shadow: 0 2px 10px rgba(245, 158, 11, 0.3);
      }
      .pagination-custom .disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .filter-bar {
          flex-direction: column;
        }
        .filter-group {
          width: 100%;
        }
        .admin-table-wrapper {
          overflow-x: auto;
        }
        .admin-table {
          min-width: 800px;
        }
      }
    </style>
  </head>

  <body>
    <div th:replace="admin/fragments/header :: header_nav"></div>
    <div id="layoutSidenav">
      <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
      <div id="layoutSidenav_content">
        <main class="page-content">
          <!-- Alert -->
          <div class="alert-custom alert-custom--success" th:if="${message}">
            <i class="fas fa-check-circle"></i>
            <span th:text="${message}"></span>
          </div>

          <!-- Page Header -->
          <div class="page-header">
            <div class="page-header__left">
              <div class="page-header__icon">
                <i class="fas fa-newspaper"></i>
              </div>
              <div>
                <h1 class="page-header__title">Danh sách bài viết</h1>
                <p class="page-header__sub">Quản lý bài viết trong hệ thống</p>
              </div>
            </div>
            <a class="btn-add" th:href="@{/admin/blogs_management/add}">
              <i class="fas fa-plus"></i> Thêm bài viết
            </a>
          </div>

          <!-- Filter Bar -->
          <form
            class="filter-bar"
            th:action="@{/admin/blogs_management}"
            method="get"
            th:object="${search}"
          >
            <div class="filter-group">
              <label class="filter-label">Người đăng</label>
              <select class="filter-select" th:field="*{userId}">
                <option value="">Tất cả người đăng</option>
                <option
                  th:each="user : ${users}"
                  th:text="${user.fullName}"
                  th:value="${user.id}"
                ></option>
              </select>
            </div>
            <div class="filter-group">
              <label class="filter-label">Từ khóa</label>
              <input
                class="filter-input"
                th:field="*{keyword}"
                type="text"
                placeholder="Nhập từ khóa..."
              />
            </div>
            <button class="btn-search" type="submit">
              <i class="fas fa-search"></i> Tìm kiếm
            </button>
          </form>

          <!-- Card -->
          <div class="admin-card">
            <!-- Empty State -->
            <div
              class="empty-state"
              th:if="${blogPage == null or blogPage.isEmpty()}"
            >
              <div class="empty-state__icon">
                <i class="fas fa-newspaper"></i>
              </div>
              <p class="empty-state__text">Chưa có bài viết nào</p>
            </div>

            <!-- Table -->
            <div
              class="admin-table-wrapper"
              th:if="${blogPage != null and !blogPage.isEmpty()}"
            >
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Tiêu đề</th>
                    <th>Người đăng</th>
                    <th>Ngày đăng</th>
                    <th>Tóm tắt</th>
                    <th>Ảnh</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="blog : ${blogPage}">
                    <td th:text="${blog.id}"></td>
                    <td
                      style="font-weight: 600; color: #1e293b; max-width: 200px"
                    >
                      <span
                        style="
                          display: -webkit-box;
                          -webkit-line-clamp: 2;
                          -webkit-box-orient: vertical;
                          overflow: hidden;
                        "
                        th:text="${blog.title}"
                      ></span>
                    </td>
                    <td
                      th:text="${blog.user != null ? blog.user.fullName : '—'}"
                    ></td>
                    <td
                      th:text="${#dates.format(blog.createdAt, 'dd-MM-yyyy')}"
                    ></td>
                    <td style="max-width: 220px">
                      <span
                        style="
                          display: -webkit-box;
                          -webkit-line-clamp: 2;
                          -webkit-box-orient: vertical;
                          overflow: hidden;
                          color: #64748b;
                        "
                        th:text="${blog.summary != null ? blog.summary : '—'}"
                      ></span>
                    </td>
                    <td>
                      <img
                        class="blog-thumb"
                        th:src="${blog.thumbnail}"
                        onerror="this.style.display='none'"
                        alt="thumbnail"
                      />
                    </td>
                    <td>
                      <div class="action-btns">
                        <a
                          class="btn-action btn-action--edit"
                          th:href="@{/admin/blogs_management/edit/__${blog.id}__}"
                        >
                          <i class="fas fa-edit"></i> Sửa
                        </a>
                        <button
                          class="btn-action btn-action--delete btn-delete"
                          th:data-product-id="${blog.id}"
                        >
                          <i class="fas fa-trash-alt"></i> Xóa
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <div class="pagination-custom" th:if="${totalPages > 1}">
              <a
                th:href="@{/admin/blogs_management(page=1, userId=${search != null ? search.userId : ''}, keyword=${search != null ? search.keyword : ''})}"
                th:class="${currentPage == 1} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-double-left"></i>
              </a>
              <a
                th:href="@{/admin/blogs_management(page=${currentPage - 1}, userId=${search != null ? search.userId : ''}, keyword=${search != null ? search.keyword : ''})}"
                th:class="${currentPage == 1} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-left"></i>
              </a>

              <span
                th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active' : ''"
              >
                <a
                  th:href="@{/admin/blogs_management(page=${i}, userId=${search != null ? search.userId : ''}, keyword=${search != null ? search.keyword : ''})}"
                  th:text="${i}"
                  th:if="${i != currentPage}"
                ></a>
                <span th:text="${i}" th:if="${i == currentPage}"></span>
              </span>

              <a
                th:href="@{/admin/blogs_management(page=${currentPage + 1}, userId=${search != null ? search.userId : ''}, keyword=${search != null ? search.keyword : ''})}"
                th:class="${currentPage == totalPages} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-right"></i>
              </a>
              <a
                th:href="@{/admin/blogs_management(page=${totalPages}, userId=${search != null ? search.userId : ''}, keyword=${search != null ? search.keyword : ''})}"
                th:class="${currentPage == totalPages} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-double-right"></i>
              </a>
            </div>
          </div>
        </main>
        <div th:replace="admin/fragments/footer :: footer"></div>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div
      class="modal-overlay"
      id="deleteModal"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
      "
    >
      <div
        style="
          background: #fff;
          border-radius: 16px;
          padding: 32px;
          max-width: 400px;
          width: 90%;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
          animation: fadeSlideUp 0.3s ease;
        "
      >
        <div style="text-align: center; margin-bottom: 20px">
          <div
            style="
              width: 60px;
              height: 60px;
              border-radius: 50%;
              background: rgba(239, 68, 68, 0.1);
              margin: 0 auto 16px;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            <i
              class="fas fa-exclamation-triangle"
              style="font-size: 28px; color: #ef4444"
            ></i>
          </div>
          <h3
            style="
              font-size: 18px;
              font-weight: 700;
              color: #1e293b;
              margin-bottom: 8px;
            "
          >
            Xác nhận xóa bài viết
          </h3>
          <p style="font-size: 14px; color: #64748b">
            Bạn có chắc chắn muốn xóa bài viết này không? Hành động này không
            thể hoàn tác.
          </p>
        </div>
        <div style="display: flex; gap: 12px">
          <button
            onclick="closeDeleteModal()"
            style="
              flex: 1;
              padding: 11px;
              border-radius: 25px;
              border: 1.5px solid #e2e8f0;
              background: #fff;
              color: #64748b;
              font-size: 14px;
              font-weight: 600;
              font-family: 'Be Vietnam Pro', sans-serif;
              cursor: pointer;
              transition: all 0.2s;
            "
          >
            Hủy
          </button>
          <a
            id="confirmDeleteBtn"
            style="
              flex: 1;
              padding: 11px;
              border-radius: 25px;
              border: none;
              background: linear-gradient(135deg, #ef4444, #dc2626);
              color: #fff;
              font-size: 14px;
              font-weight: 600;
              font-family: 'Be Vietnam Pro', sans-serif;
              cursor: pointer;
              text-align: center;
              text-decoration: none;
              box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
              transition: all 0.2s;
            "
          >
            Xóa
          </a>
        </div>
      </div>
    </div>

    <script
      crossorigin="anonymous"
      th:src="@{/js/admin/bootstrap.bundle.min.js}"
    ></script>
    <script th:src="@{/js/admin/scripts.js}"></script>
    <script>
      function openDeleteModal(blogId) {
        var btn = document.getElementById("confirmDeleteBtn");
        btn.href = "/admin/blogs_management/delete/" + blogId;
        document.getElementById("deleteModal").style.display = "flex";
      }
      function closeDeleteModal() {
        document.getElementById("deleteModal").style.display = "none";
      }
      document
        .getElementById("deleteModal")
        .addEventListener("click", function (e) {
          if (e.target === this) closeDeleteModal();
        });

      $(document).ready(function () {
        $(".btn-delete").on("click", function () {
          var blogId = $(this).attr("data-product-id");
          openDeleteModal(blogId);
        });
      });
    </script>
  </body>
</html>
