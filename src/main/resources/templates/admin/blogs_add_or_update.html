<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <title>Bài viết - HTX Dương Hòa</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}"/>
    <script crossorigin="anonymous" th:src="@{/js/admin/fontawesome-all.js}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.ckeditor.com/ckeditor5/34.1.0/classic/ckeditor.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }

        .page-content { padding: 28px; animation: fadeSlideUp 0.4s ease both; }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== PAGE HEADER ===== */
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-header__left { display: flex; align-items: center; gap: 12px; }
        .page-header__icon {
            width: 46px; height: 46px; border-radius: 12px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px;
        }
        .page-header__title { font-size: 22px; font-weight: 700; color: #1e293b; }
        .page-header__sub { font-size: 13px; color: #94a3b8; }

        /* ===== ALERT ===== */
        .alert-custom {
            border-radius: 12px; padding: 14px 18px;
            margin-bottom: 20px; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-custom--success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 1px solid #6ee7b7; color: #065f46;
        }
        .alert-custom--danger {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            border: 1px solid #fca5a5; color: #991b1b;
        }

        /* ===== CARD ===== */
        .admin-card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            padding: 32px;
        }

        /* ===== FORM GROUP ===== */
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 600;
            color: #475569; margin-bottom: 8px;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            font-size: 13.5px; font-family: 'Be Vietnam Pro', sans-serif;
            color: #334155; background: #f8fafc; outline: none;
            transition: border-color 0.2s ease;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            border-color: #f59e0b; background: #fff;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }
        .form-hint { font-size: 12px; color: #94a3b8; margin-top: 6px; }

        /* ===== IMAGE PREVIEW ===== */
        .img-preview {
            max-width: 160px; max-height: 120px; border-radius: 10px;
            object-fit: cover; border: 1px solid #e2e8f0;
        }
        .image-preview { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
        .image-preview__remove {
            width: 28px; height: 28px; border-radius: 50%;
            background: #ef4444; color: #fff; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 12px; flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .image-preview__remove:hover { background: #dc2626; transform: scale(1.1); }
        .upload-note { font-size: 11px; color: #94a3b8; margin-top: 6px; }

        /* ===== UPLOAD AREA ===== */
        .upload-area {
            border: 2px dashed #e2e8f0; border-radius: 12px;
            padding: 24px; text-align: center; cursor: pointer;
            transition: all 0.25s ease; background: #f8fafc;
        }
        .upload-area:hover { border-color: #f59e0b; background: #fffbeb; }
        .upload-area__icon { font-size: 36px; color: #fcd34d; margin-bottom: 8px; }
        .upload-area__text { font-size: 13px; color: #64748b; font-weight: 500; }
        .upload-area__text span { color: #f59e0b; font-weight: 600; }

        /* ===== CHECKBOX GROUP ===== */
        .category-group {
            background: #f8fafc; border: 1.5px solid #e2e8f0;
            border-radius: 10px; padding: 16px 20px;
            max-height: 280px; overflow-y: auto;
        }
        .category-group__title {
            font-size: 13px; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.4px;
            margin-bottom: 12px;
        }
        .category-group__item {
            margin-bottom: 14px;
        }
        .category-group__name {
            font-size: 12px; font-weight: 600; color: #94a3b8;
            margin-bottom: 8px; margin-left: 4px;
        }
        .product-check { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .product-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: #f59e0b; }
        .product-check label { font-size: 13px; color: #475569; cursor: pointer; }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 25px;
            font-size: 14px; font-weight: 600;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff; border: none; cursor: pointer;
            box-shadow: 0 4px 14px rgba(245,158,11,0.35);
            transition: all 0.25s ease;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.45); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .page-content { padding: 20px 16px; }
            .admin-card { padding: 20px; }
        }
    </style>
</head>

<body>
<div th:replace="admin/fragments/header :: header_nav"></div>
<div id="layoutSidenav">
    <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
    <div id="layoutSidenav_content">
        <main class="page-content">
            <!-- Alert -->
            <div class="alert-custom alert-custom--danger" th:if="${error}">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <!-- Page Header -->
            <div class="page-header">
                <div class="page-header__left">
                    <div class="page-header__icon">
                        <i class="fas fa-newspaper"></i>
                    </div>
                    <div>
                        <h1 class="page-header__title" th:text="${blog.id != null} ? 'Cập nhật bài viết' : 'Thêm bài viết'">Thêm bài viết</h1>
                        <p class="page-header__sub">Quản lý bài viết trong hệ thống</p>
                    </div>
                </div>
            </div>

            <!-- Card -->
            <div class="admin-card">
                <form enctype="multipart/form-data" method="post" th:action="@{/admin/blogs_management/add}" th:object="${blog}">
                    <input th:field="*{id}" type="hidden"/>

                    <div class="form-group">
                        <label class="form-label" for="blogTitle">Tiêu đề</label>
                        <input class="form-input" id="blogTitle" placeholder="Nhập tiêu đề bài viết"
                               required th:field="*{title}" type="text"/>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="userId">Người đăng bài</label>
                        <select class="form-select" id="userId" required th:field="*{user.id}">
                            <option value="">-- Chọn người đăng --</option>
                            <option th:each="user : ${users}" th:text="${user.fullName}" th:value="${user.id}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="summary">Tóm tắt</label>
                        <input class="form-input" id="summary" placeholder="Nhập tóm tắt ngắn gọn"
                               required th:field="*{summary}" type="text"/>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="content">Nội dung</label>
                        <textarea class="form-textarea" id="content" placeholder="Nhập nội dung bài viết"
                                  rows="5" th:field="*{content}"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Ảnh thumbnail</label>
                        <div class="upload-area" onclick="document.getElementById('coverImageInput').click()">
                            <div class="upload-area__icon">
                                <i class="fas fa-cloud-upload-alt"></i>
                            </div>
                            <div class="upload-area__text">
                                Kéo thả ảnh vào đây hoặc <span>chọn tệp</span>
                            </div>
                        </div>
                        <input id="coverImageInput" name="blog_thumbnail" type="file" accept="image/*"
                               style="display:none;" onchange="previewNewImage(this)"/>
                        <div class="upload-note">Hỗ trợ JPG, PNG, WEBP. Nếu không chọn ảnh mới, ảnh cũ sẽ được giữ lại.</div>
                        <div id="imagePreviewArea" style="margin-top:12px;">
                            <img th:if="${blog.thumbnail != null}" class="img-preview"
                                 id="oldImagePreview" th:src="${blog.thumbnail}" alt="thumbnail"/>
                            <img id="newImagePreview" class="img-preview" style="display:none;" alt="preview"/>
                            <button type="button" id="removeNewImage" class="image-preview__remove"
                                    style="display:none;" onclick="removeNewImage()">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Sản phẩm liên quan</label>
                        <div class="category-group">
                            <div class="category-group__title">Danh sách sản phẩm</div>
                            <div th:each="category : ${categories}" class="category-group__item">
                                <div class="category-group__name" th:text="${category.name}"></div>
                                <div th:each="product : ${products}">
                                    <div class="product-check"
                                         th:if="${product.category != null and product.category.id == category.id}">
                                        <input class="form-check-input"
                                               type="checkbox"
                                               th:id="${'product-' + product.id}"
                                               name="selectedProducts"
                                               th:value="${product.id}"
                                               th:checked="${blog.products != null and blog.products.contains(product)}"/>
                                        <label th:for="${'product-' + product.id}" th:text="${product.title}"></label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button class="btn-submit" type="submit">
                        <i class="fas fa-check"></i> Xác nhận
                    </button>
                </form>
            </div>
        </main>
        <div th:replace="admin/fragments/footer :: footer"></div>
    </div>
</div>

<script>
    function previewNewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var newPreview = document.getElementById('newImagePreview');
                newPreview.src = e.target.result;
                newPreview.style.display = 'block';
                document.getElementById('removeNewImage').style.display = 'flex';
                var oldPreview = document.getElementById('oldImagePreview');
                if (oldPreview) oldPreview.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function removeNewImage() {
        document.getElementById('coverImageInput').value = '';
        document.getElementById('newImagePreview').style.display = 'none';
        document.getElementById('removeNewImage').style.display = 'none';
        var oldPreview = document.getElementById('oldImagePreview');
        if (oldPreview) oldPreview.style.display = 'block';
    }

    if (document.querySelector('#content')) {
        ClassicEditor.create(document.querySelector('#content'), {
            height: 400,
            ckfinder: {
                uploadUrl: '/admin/blogs_management/upload-image'
            },
            toolbar: [
                'heading', '|', 'bold', 'italic', 'link', 'bulletedList', 'numberedList',
                'blockQuote', 'undo', 'redo', 'imageUpload', 'insertTable', 'mediaEmbed'
            ],
            table: { contentToolbar: ['tableColumn', 'tableRow', 'mergeTableCells'] }
        }).catch(error => { console.error(error); });
    }
</script>
<script crossorigin="anonymous" th:src="@{/js/admin/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/admin/scripts.js}"></script>
</body>
</html>
