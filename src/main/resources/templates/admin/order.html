<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
      name="viewport"
    />
    <title>Quản lý đơn hàng - HTX Dương Hòa</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script
      crossorigin="anonymous"
      th:src="@{/js/admin/fontawesome-all.js}"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Be Vietnam Pro", sans-serif;
      }

      .page-content {
        padding: 28px;
        animation: fadeSlideUp 0.4s ease both;
      }
      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== PAGE HEADER ===== */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .page-header__left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .page-header__icon {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 20px;
      }
      .page-header__title {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
      }
      .page-header__sub {
        font-size: 13px;
        color: #94a3b8;
      }

      /* ===== ALERT ===== */
      .alert-custom {
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .alert-custom--success {
        background: linear-gradient(135deg, #d1fae5, #a7f3d0);
        border: 1px solid #6ee7b7;
        color: #065f46;
      }

      /* ===== FILTER BAR ===== */
      .filter-bar {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        padding: 20px 24px;
        margin-bottom: 24px;
        display: flex;
        gap: 14px;
        align-items: flex-end;
        flex-wrap: wrap;
      }
      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 160px;
      }
      .filter-label {
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .filter-select {
        padding: 10px 36px 10px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 13px;
        font-family: "Be Vietnam Pro", sans-serif;
        color: #334155;
        background: #f8fafc;
        outline: none;
        transition: border-color 0.2s ease;
        appearance: none;
        cursor: pointer;
      }
      .filter-select:focus {
        border-color: #6366f1;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }
      .btn-filter {
        padding: 10px 22px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: "Be Vietnam Pro", sans-serif;
        box-shadow: 0 3px 12px rgba(99, 102, 241, 0.3);
        transition: all 0.25s ease;
        align-self: flex-end;
        white-space: nowrap;
      }
.btn-filter:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 18px rgba(99, 102, 241, 0.4);
      }

      .filter-date-input {
        padding: 10px 14px;
        border: 1.5px solid #e2e8f0;
        border-radius: 10px;
        font-size: 13px;
        font-family: "Be Vietnam Pro", sans-serif;
        color: #334155;
        background: #f8fafc;
        outline: none;
        transition: border-color 0.2s ease;
        cursor: pointer;
      }
      .filter-date-input:focus {
        border-color: #6366f1;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      /* ===== CARD ===== */
      .admin-card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        overflow: hidden;
        transition: box-shadow 0.3s ease;
      }
      .admin-card:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      }

      /* ===== TABLE ===== */
      .admin-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
      }
      .admin-table thead tr {
        background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      }
      .admin-table thead th {
        padding: 13px 16px;
        text-align: left;
        font-weight: 600;
        color: #64748b;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        border-bottom: 2px solid #e2e8f0;
        white-space: nowrap;
      }
      .admin-table tbody tr {
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.15s ease;
      }
      .admin-table tbody tr:last-child {
        border-bottom: none;
      }
      .admin-table tbody tr:hover {
        background: #f8fffe;
      }
      .admin-table tbody td {
        padding: 14px 16px;
        color: #475569;
        vertical-align: middle;
      }
      .admin-table tbody td:first-child {
        font-weight: 600;
        color: #94a3b8;
        font-size: 12px;
      }

      /* ===== BADGES ===== */
      .badge-order {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .badge-order--pending {
        background: rgba(245, 158, 11, 0.12);
        color: #d97706;
      }
      .badge-order--processing {
        background: rgba(99, 102, 241, 0.12);
        color: #4f46e5;
      }
      .badge-order--delivering {
        background: rgba(168, 85, 247, 0.12);
        color: #7c3aed;
      }
      .badge-order--delivered {
        background: rgba(34, 197, 94, 0.12);
        color: #16a34a;
      }
      .badge-order--cancelled {
        background: rgba(239, 68, 68, 0.12);
        color: #dc2626;
      }
      .badge-order--cod {
        background: rgba(34, 197, 94, 0.12);
        color: #16a34a;
      }
      .badge-order--qr {
        background: rgba(99, 102, 241, 0.12);
        color: #4f46e5;
      }

      /* ===== ACTION BUTTON ===== */
      .btn-detail {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        font-family: "Be Vietnam Pro", sans-serif;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        text-decoration: none;
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        transition: all 0.25s ease;
      }
      .btn-detail:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        color: #fff;
      }
      .btn-delete {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 16px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        font-family: "Be Vietnam Pro", sans-serif;
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: #fff;
        text-decoration: none;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        transition: all 0.25s ease;
        cursor: pointer;
        border: none;
      }
      .btn-delete:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
        color: #fff;
      }
      .action-group {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      /* ===== EMPTY STATE ===== */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #94a3b8;
      }
      .empty-state__icon {
        font-size: 48px;
        margin-bottom: 12px;
        color: #cbd5e1;
      }
      .empty-state__text {
        font-size: 15px;
        font-weight: 500;
      }

      /* ===== PAGINATION ===== */
      .pagination-custom {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        padding: 20px 16px;
        flex-wrap: wrap;
      }
      .pagination-custom a,
      .pagination-custom span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 36px;
        height: 36px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.2s ease;
        font-family: "Be Vietnam Pro", sans-serif;
      }
      .pagination-custom a:hover {
        background: #6366f1;
        color: #fff;
        border-color: #6366f1;
        transform: translateY(-1px);
      }
      .pagination-custom .active {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        border-color: #6366f1;
        box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
      }
      .pagination-custom .disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .filter-bar {
          flex-direction: column;
        }
        .filter-group {
          width: 100%;
        }
        .admin-table-wrapper {
          overflow-x: auto;
        }
        .admin-table {
          min-width: 800px;
        }
      }
    </style>
  </head>

  <body>
    <div th:replace="admin/fragments/header :: header_nav"></div>
    <div id="layoutSidenav">
      <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
      <div id="layoutSidenav_content">
        <main class="page-content">
          <!-- Alert -->
          <div class="alert-custom alert-custom--success" th:if="${message}">
            <i class="fas fa-check-circle"></i>
            <span th:text="${message}"></span>
          </div>

          <!-- Page Header -->
          <div class="page-header">
            <div class="page-header__left">
              <div class="page-header__icon">
                <i class="fas fa-receipt"></i>
              </div>
              <div>
                <h1 class="page-header__title">Danh sách đơn hàng</h1>
                <p class="page-header__sub">Quản lý đơn hàng trong hệ thống</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <form
              method="get"
              style="display: contents"
              th:action="@{/admin/orders_management}"
            >
              <div class="filter-group">
                <label class="filter-label">Trạng thái</label>
                <select class="filter-select" name="status">
                  <option value="">Tất cả</option>
                  <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">Chờ xử lý</option>
                  <option value="PROCESSING" th:selected="${selectedStatus == 'PROCESSING'}">Đang xử lý</option>
                  <option value="DELIVERING" th:selected="${selectedStatus == 'DELIVERING'}">Đang giao</option>
                  <option value="DELIVERED" th:selected="${selectedStatus == 'DELIVERED'}">Đã giao</option>
                  <option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">Đã hủy</option>
                </select>
              </div>
              <div class="filter-group">
                <label class="filter-label">Từ ngày</label>
                <input
                  type="date"
                  class="filter-date-input"
                  name="startDate"
                  th:value="${selectedStartDate}"
                />
              </div>
              <div class="filter-group">
                <label class="filter-label">Đến ngày</label>
                <input
                  type="date"
                  class="filter-date-input"
                  name="endDate"
                  th:value="${selectedEndDate}"
                />
              </div>
              <button class="btn-filter" type="submit">
                <i class="fas fa-filter"></i> Lọc
              </button>
              <a
                class="btn-filter"
                th:href="@{/admin/orders_management}"
                style="background: linear-gradient(135deg, #94a3b8, #64748b); text-decoration: none;"
              >
                <i class="fas fa-undo"></i> Reset
              </a>
            </form>
          </div>

          <!-- Card -->
          <div class="admin-card">
            <th:block th:if="${orderPage == null or orderPage.isEmpty()}">
              <div class="empty-state">
                <div class="empty-state__icon">
                  <i class="fas fa-receipt"></i>
                </div>
                <p class="empty-state__text">Không có đơn hàng nào</p>
              </div>
            </th:block>

            <th:block th:if="${orderPage != null and not orderPage.isEmpty()}">
              <div class="admin-table-wrapper">
                <table class="admin-table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Mã đơn</th>
                      <th>Người nhận</th>
                      <th>Điện thoại</th>
                      <th>Email</th>
                      <th>Ngày tạo</th>
                      <th>Tổng giá</th>
                      <th>Trạng thái</th>
                      <th>Thanh toán</th>
                      <th style="text-align: center">Hành động</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="order : ${orderPage}">
                      <td th:text="${order.id}"></td>
                      <td>
                        <span
                          style="
                            font-family: monospace;
                            font-size: 12px;
                            background: #f0f4f8;
                            padding: 3px 8px;
                            border-radius: 6px;
                            color: #4a5568;
                          "
                          th:text="${order.code}"
                        ></span>
                      </td>
                      <td
                        style="font-weight: 500; color: #1e293b"
                        th:text="${order.reciever}"
                      ></td>
                      <td th:text="${order.phoneNumber}"></td>
                      <td th:text="${order.emailAddress}"></td>
                      <td
                        th:text="${#dates.format(order.createdAt, 'dd-MM-yyyy HH:mm')}"
                      ></td>
                      <td>
                        <span
                          style="
                            font-weight: 700;
                            color: #ef4444;
                            font-size: 13px;
                          "
                          th:text="${order.totalPriceFormatted} + ' đ'"
                        ></span>
                      </td>
                      <td>
                        <th:block th:if="${order.status == 'PENDING'}">
                          <span
                            class="badge-order badge-order--pending"
                            th:text="${order.status}"
                          ></span>
                        </th:block>
                        <th:block th:if="${order.status == 'PROCESSING'}">
                          <span
                            class="badge-order badge-order--processing"
                            th:text="${order.status}"
                          ></span>
                        </th:block>
                        <th:block th:if="${order.status == 'DELIVERING'}">
                          <span
                            class="badge-order badge-order--delivering"
                            th:text="${order.status}"
                          ></span>
                        </th:block>
                        <th:block th:if="${order.status == 'DELIVERED'}">
                          <span
                            class="badge-order badge-order--delivered"
                            th:text="${order.status}"
                          ></span>
                        </th:block>
                        <th:block th:if="${order.status == 'CANCELLED'}">
                          <span
                            class="badge-order badge-order--cancelled"
                            th:text="${order.status}"
                          ></span>
                        </th:block>
                      </td>
                      <td>
                        <span
                          class="badge-order badge-order--cod"
                          th:if="${order.paymentMethod == 'COD'}"
                          th:text="${order.paymentMethod}"
                        ></span>
                        <span
                          class="badge-order badge-order--qr"
                          th:if="${order.paymentMethod != 'COD'}"
                          th:text="${order.paymentMethod}"
                        ></span>
                      </td>
                      <td style="text-align: center">
                        <div class="action-group">
                          <a
                            class="btn-detail"
                            th:href="@{/admin/orders_management/details/{id}(id=${order.id})}"
                          >
                            <i class="fas fa-eye"></i> Chi tiết
                          </a>
                          <form th:id="'deleteForm-' + ${order.id}" method="post" th:action="@{/admin/orders_management/delete/{id}(id=${order.id})}" style="display:none;">
                          </form>
                          <a
                            class="btn-delete"
                            href="#"
                            th:data-id="${order.id}"
                            onclick="confirmDelete(this)"
                          >
                            <i class="fas fa-trash-alt"></i> Xóa
                          </a>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- Pagination -->
              <div class="pagination-custom" th:if="${totalPages > 1}">
                <a
                  th:href="@{/admin/orders_management(page=1, status=${selectedStatus}, startDate=${selectedStartDate}, endDate=${selectedEndDate})}"
                  th:class="${currentPage == 0} ? 'disabled' : ''"
                >
                  <i class="fas fa-angle-double-left"></i>
                </a>
                <a
                  th:href="@{/admin/orders_management(page=${currentPage}, status=${selectedStatus}, startDate=${selectedStartDate}, endDate=${selectedEndDate})}"
                  th:class="${currentPage == 0} ? 'disabled' : ''"
                >
                  <i class="fas fa-angle-left"></i>
                </a>

                <span
                  th:each="i : ${#numbers.sequence(1, totalPages)}"
                  th:classappend="${i == currentPage + 1} ? 'active' : ''"
                >
                  <a
                    th:href="@{/admin/orders_management(page=${i}, status=${selectedStatus}, startDate=${selectedStartDate}, endDate=${selectedEndDate})}"
                    th:text="${i}"
                    th:if="${i != currentPage + 1}"
                  ></a>
                  <span th:text="${i}" th:if="${i == currentPage + 1}"></span>
                </span>

                <a
                  th:href="@{/admin/orders_management(page=${currentPage + 2}, status=${selectedStatus}, startDate=${selectedStartDate}, endDate=${selectedEndDate})}"
                  th:class="${currentPage + 1 == totalPages} ? 'disabled' : ''"
                >
                  <i class="fas fa-angle-right"></i>
                </a>
                <a
                  th:href="@{/admin/orders_management(page=${totalPages}, status=${selectedStatus}, startDate=${selectedStartDate}, endDate=${selectedEndDate})}"
                  th:class="${currentPage + 1 == totalPages} ? 'disabled' : ''"
                >
                  <i class="fas fa-angle-double-right"></i>
                </a>
              </div>
            </th:block>
          </div>
        </main>
        <div th:replace="admin/fragments/footer :: footer"></div>
      </div>
    </div>

    <script
      crossorigin="anonymous"
      th:src="@{/js/admin/bootstrap.bundle.min.js}"
    ></script>
    <script th:src="@{/js/admin/scripts.js}"></script>
    <script>
      function confirmDelete(el) {
        var orderId = el.getAttribute('data-id');
        if (confirm('Bạn có chắc muốn xóa đơn hàng #' + orderId + ' không?')) {
          document.getElementById('deleteForm-' + orderId).submit();
        }
      }
    </script>
  </body>
</html>
