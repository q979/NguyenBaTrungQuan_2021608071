<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
      name="viewport"
    />
    <title>Quản lý người dùng - HTX Dương Hòa</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}" />
    <script
      crossorigin="anonymous"
      th:src="@{/js/admin/fontawesome-all.js}"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Be Vietnam Pro", sans-serif;
      }

      .page-content {
        padding: 28px;
        animation: fadeSlideUp 0.4s ease both;
      }
      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ===== PAGE HEADER ===== */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .page-header__left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .page-header__icon {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 20px;
      }
      .page-header__title {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
      }
      .page-header__sub {
        font-size: 13px;
        color: #94a3b8;
      }

      /* ===== SUCCESS MESSAGE ===== */
      .alert-success-custom {
        background: linear-gradient(135deg, #d1fae5, #a7f3d0);
        border: 1px solid #6ee7b7;
        color: #065f46;
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* ===== CARD ===== */
      .admin-card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        overflow: hidden;
        transition: box-shadow 0.3s ease;
      }
      .admin-card:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      }

      /* ===== TABLE ===== */
      .admin-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
      }
      .admin-table thead tr {
        background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      }
      .admin-table thead th {
        padding: 13px 16px;
        text-align: left;
        font-weight: 600;
        color: #64748b;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        border-bottom: 2px solid #e2e8f0;
        white-space: nowrap;
      }
      .admin-table tbody tr {
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.15s ease;
      }
      .admin-table tbody tr:hover {
        background: #f8fffe;
      }
      .admin-table tbody tr:last-child {
        border-bottom: none;
      }
      .admin-table tbody td {
        padding: 13px 16px;
        color: #475569;
        vertical-align: middle;
      }

      /* ===== AVATAR ===== */
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        flex-shrink: 0;
        letter-spacing: 0.5px;
      }

      /* ===== BADGES ===== */
      .role-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .role-badge--admin {
        background: rgba(239, 68, 68, 0.1);
        color: #dc2626;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
      .role-badge--user {
        background: rgba(34, 197, 94, 0.1);
        color: #16a34a;
        border: 1px solid rgba(34, 197, 94, 0.2);
      }

      /* ===== ACTION BUTTONS ===== */
      .account-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .account-badge--active {
        background: rgba(34, 197, 94, 0.1);
        color: #16a34a;
        border: 1px solid rgba(34, 197, 94, 0.2);
      }
      .account-badge--locked {
        background: rgba(239, 68, 68, 0.1);
        color: #dc2626;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }
      .btn-edit-sm {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        font-family: "Be Vietnam Pro", sans-serif;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: #fff;
        border: none;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
        text-decoration: none;
      }
      .btn-edit-sm:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);
        color: #fff;
      }
      .btn-delete-sm {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        font-family: "Be Vietnam Pro", sans-serif;
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: #fff;
        border: none;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);
      }
      .btn-delete-sm:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(239, 68, 68, 0.35);
        color: #fff;
      }

      /* ===== PAGINATION ===== */
      .pagination-custom {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        padding: 20px 16px;
        flex-wrap: wrap;
      }
      .pagination-custom a,
      .pagination-custom span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 36px;
        height: 36px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.2s ease;

        font-family: "Be Vietnam Pro", sans-serif;
      }
      .pagination-custom a:hover {
        background: #3b82f6;
        color: #fff;
        border-color: #3b82f6;
        transform: translateY(-1px);
      }
      .pagination-custom .active {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: #fff;
        border-color: #3b82f6;
        box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
      }
      .pagination-custom .disabled {
        opacity: 0.4;
        pointer-events: none;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .admin-table-wrapper {
          overflow-x: auto;
        }
        .admin-table {
          min-width: 600px;
        }
      }
    </style>
  </head>

  <body>
    <div th:replace="admin/fragments/header :: header_nav"></div>
    <div id="layoutSidenav">
      <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
      <div id="layoutSidenav_content">
        <main class="page-content">
          <!-- Alert -->
          <div class="alert-success-custom" th:if="${successMessage}">
            <i class="fas fa-check-circle"></i>
            <span th:text="${successMessage}"></span>
          </div>

          <!-- Page Header -->
          <div class="page-header">
            <div class="page-header__left">
              <div class="page-header__icon">
                <i class="fas fa-users"></i>
              </div>
              <div>
                <h1 class="page-header__title">Danh sách người dùng</h1>
                <p class="page-header__sub">
                  Quản lý tài khoản người dùng trong hệ thống
                </p>
              </div>
            </div>
          </div>

          <!-- Card Table -->
          <div class="admin-card">
            <div class="admin-table-wrapper">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Người dùng</th>
                    <th>Họ và tên</th>
                    <th>Điện thoại</th>
                    <th>Địa chỉ</th>
                    <th>Trạng thái</th>
                    <th>Vai trò</th>
                    <th>Hành động</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="user : ${users}">
                    <td
                      style="font-weight: 600; color: #94a3b8; font-size: 12px"
                      th:text="${user.id}"
                    ></td>
                    <td>
                      <div
                        style="display: flex; align-items: center; gap: 10px"
                      >
                        <div
                          class="user-avatar"
                          th:text="${user.fullName != null ? #strings.substring(user.fullName, 0, 1) : '?'}"
                        ></div>
                        <span
                          style="font-weight: 500; color: #334155"
                          th:text="${user.email}"
                        ></span>
                      </div>
                    </td>
                    <td th:text="${user.fullName}"></td>
                    <td
                      th:text="${user.phoneNumber != null ? user.phoneNumber : '—'}"
                    ></td>
                    <td
                      th:text="${user.address != null ? #strings.length(user.address) > 30 ? #strings.substring(user.address, 0, 30) + '...' : user.address : '—'}"
                    ></td>
                    <td>
                      <span class="account-badge"
                        th:classappend="${user.status != null and user.status.name() == 'ONLINE'} ? 'account-badge--active' : 'account-badge--locked'"
                        th:text="${user.status != null and user.status.name() == 'ONLINE'} ? 'Hoạt động' : 'Bị khóa'"
                      ></span>
                    </td>
                    <td>
                      <span th:each="role : ${user.getRoles()}">
                        <span
                          class="role-badge"
                          th:classappend="${role.name == 'ROLE_ADMIN'} ? 'role-badge--admin' : 'role-badge--user'"
                          th:text="${role.name == 'ROLE_ADMIN'} ? 'Admin' : 'User'"
                        >
                        </span>
                      </span>
                    </td>
                    <td>
                      <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <a
                          class="btn-edit-sm"
                          th:href="@{/admin/users_management/edit/__${user.id}__}"
                        >
                          <i class="fas fa-edit"></i> Sửa
                        </a>
                        <span th:each="role : ${user.getRoles()}">
                          <button
                            class="btn-delete-sm"
                            th:unless="${role.name == 'ROLE_ADMIN'}"
                            th:onclick="'deleteUser(' + ${user.id} + ')'"
                          >
                            <i class="fas fa-trash-alt"></i> Xóa
                          </button>
                        </span>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <div class="pagination-custom" th:if="${users.totalPages > 1}">
              <a
                th:href="@{/admin/users_management(page=1)}"
                th:class="${users.number + 1 == 1} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-double-left"></i>
              </a>
              <a
                th:href="@{/admin/users_management(page=${users.number})}"
                th:class="${users.number + 1 == 1} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-left"></i>
              </a>

              <span
                th:each="i : ${#numbers.sequence(1, users.totalPages)}"
                th:classappend="${i == users.number + 1} ? 'active' : ''"
              >
                <a
                  th:href="@{/admin/users_management(page=${i})}"
                  th:text="${i}"
                  th:if="${i != users.number + 1}"
                ></a>
                <span th:text="${i}" th:if="${i == users.number + 1}"></span>
              </span>

              <a
                th:href="@{/admin/users_management(page=${users.number + 2})}"
                th:class="${users.number + 1 == users.totalPages} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-right"></i>
              </a>
              <a
                th:href="@{/admin/users_management(page=${users.totalPages})}"
                th:class="${users.number + 1 == users.totalPages} ? 'disabled' : ''"
              >
                <i class="fas fa-angle-double-right"></i>
              </a>
            </div>
          </div>
        </main>
        <div th:replace="admin/fragments/footer :: footer"></div>
      </div>
    </div>

    <script
      crossorigin="anonymous"
      th:src="@{/js/admin/bootstrap.bundle.min.js}"
    ></script>
    <script th:src="@{/js/admin/scripts.js}"></script>
    <script>
      function deleteUser(userId) {
        if (confirm("Bạn có chắc chắn muốn xóa người dùng này không?")) {
          window.location.href =
            "/admin/users_management/delete_user/" + userId;
        }
      }
    </script>
  </body>
</html>
