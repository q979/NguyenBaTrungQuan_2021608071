<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <title>Trả lời khách hàng - HTX Dương Hòa</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script crossorigin="anonymous" th:src="@{/js/admin/fontawesome-all.js}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }

        .page-content { padding: 28px; animation: fadeSlideUp 0.4s ease both; }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #94a3b8; margin-bottom: 20px; }
        .breadcrumb a { color: #6366f1; text-decoration: none; font-weight: 500; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb-sep { color: #cbd5e1; font-size: 10px; }

        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .page-header__left { display: flex; align-items: center; gap: 12px; }
        .page-header__icon {
            width: 46px; height: 46px; border-radius: 12px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px;
        }
        .page-header__title { font-size: 22px; font-weight: 700; color: #1e293b; }
        .page-header__sub { font-size: 13px; color: #94a3b8; }

        .alert-custom {
            border-radius: 12px; padding: 14px 18px;
            margin-bottom: 20px; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-custom--success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 1px solid #6ee7b7; color: #065f46;
        }

        .form-card {
            background: #fff; border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            overflow: hidden; transition: box-shadow 0.3s ease; max-width: 640px;
        }
        .form-card__header {
            padding: 16px 24px; border-bottom: 2px solid #f1f5f9;
            font-size: 15px; font-weight: 700; color: #1e293b;
            display: flex; align-items: center; gap: 10px;
        }
        .form-card__header-icon { color: #06b6d4; font-size: 18px; }
        .form-card__body { padding: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-label {
            display: block; font-size: 13px; font-weight: 600;
            color: #64748b; margin-bottom: 8px;
        }
        .form-control {
            width: 100%; padding: 11px 16px;
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            font-size: 13.5px; font-family: 'Be Vietnam Pro', sans-serif;
            color: #334155; background: #f8fafc;
            outline: none; transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-control:focus {
            border-color: #06b6d4; background: #fff;
            box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
        }
        .form-control[readonly] { background: #f1f5f9; color: #64748b; cursor: not-allowed; }
        textarea.form-control { resize: vertical; min-height: 160px; }

        .btn-submit {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 25px;
            font-size: 14px; font-weight: 600;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            color: #fff; border: none; cursor: pointer;
            box-shadow: 0 4px 14px rgba(6,182,212,0.35);
            transition: all 0.25s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6,182,212,0.45);
            color: #fff;
        }

        @media (max-width: 768px) {
            .page-content { padding: 20px 16px; }
            .form-card { max-width: 100%; }
        }
    </style>
</head>

<body>
<div th:replace="admin/fragments/header :: header_nav"></div>
<div id="layoutSidenav">
    <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
    <div id="layoutSidenav_content">
        <main class="page-content">

            <div class="breadcrumb">
                <a th:href="@{/admin}"><i class="fas fa-home"></i> Trang chủ</a>
                <span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>
                <a th:href="@{/admin/contacts}">Liên hệ</a>
                <span class="breadcrumb-sep"><i class="fas fa-chevron-right"></i></span>
                <span>Trả lời khách hàng</span>
            </div>

            <div class="page-header">
                <div class="page-header__left">
                    <div class="page-header__icon">
                        <i class="fas fa-reply"></i>
                    </div>
                    <div>
                        <h1 class="page-header__title">Trả lời khách hàng</h1>
                        <p class="page-header__sub">Gửi phản hồi qua email</p>
                    </div>
                </div>
            </div>

            <div class="alert-custom alert-custom--success" th:if="${param.success}">
                <i class="fas fa-check-circle"></i>
                <span>Gửi phản hồi thành công!</span>
            </div>

            <div class="form-card">
                <div class="form-card__header">
                    <i class="fas fa-paper-plane form-card__header-icon"></i>
                    Soạn nội dung phản hồi
                </div>
                <div class="form-card__body">
                    <form method="post" th:action="@{/admin/contacts/submit_email}" th:object="${newEmail}">
                        <input th:name="uid" th:value="${uid}" type="hidden"/>

                        <div class="form-group">
                            <label class="form-label">Người nhận:</label>
                            <input class="form-control" th:field="*{to}" type="email" readonly/>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tiêu đề:</label>
                            <input class="form-control" placeholder="Nhập tiêu đề phản hồi..." required="" th:field="*{subject}" type="text"/>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Nội dung:</label>
                            <textarea class="form-control" placeholder="Nhập nội dung phản hồi..." rows="6" th:field="*{message}"></textarea>
                        </div>

                        <button type="submit" class="btn-submit">
                            <i class="fas fa-paper-plane"></i> Gửi phản hồi
                        </button>
                    </form>
                </div>
            </div>

        </main>
        <div th:replace="admin/fragments/footer :: footer"></div>
    </div>
</div>

<script crossorigin="anonymous" th:src="@{/js/admin/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/admin/scripts.js}"></script>
</body>
</html>
