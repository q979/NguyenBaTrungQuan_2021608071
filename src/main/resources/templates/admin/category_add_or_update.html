<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8"/>
    <meta content="IE=edge" http-equiv="X-UA-Compatible"/>
    <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
    <title>Thêm / Cập nhật danh mục - HTX Dương Hòa</title>
    <link rel="stylesheet" th:href="@{/css/admin/styles.css}"/>
    <script crossorigin="anonymous" th:src="@{/js/admin/fontawesome-all.js}"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }

        .page-content { padding: 28px; animation: fadeSlideUp 0.4s ease both; }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== PAGE HEADER ===== */
        .page-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 28px;
        }
        .page-header__icon {
            width: 46px; height: 46px; border-radius: 12px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px;
        }
        .page-header__title { font-size: 22px; font-weight: 700; color: #1e293b; }
        .page-header__sub { font-size: 13px; color: #94a3b8; }

        /* ===== ALERT ===== */
        .alert-custom {
            border-radius: 12px; padding: 14px 18px;
            margin-bottom: 20px; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-custom--success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 1px solid #6ee7b7; color: #065f46;
        }

        /* ===== FORM CARD ===== */
        .form-card {
            background: #fff; border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            padding: 36px; max-width: 560px;
            animation: fadeSlideUp 0.5s ease both;
        }
        .form-card:hover { box-shadow: 0 8px 36px rgba(0,0,0,0.12); }

        .form-card__title {
            font-size: 17px; font-weight: 700; color: #1e293b;
            margin-bottom: 28px; padding-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
            display: flex; align-items: center; gap: 10px;
        }
        .form-card__title i { color: #22c55e; font-size: 18px; }

        /* ===== FORM GROUP ===== */
        .form-group { margin-bottom: 22px; }

        .form-label {
            display: block; font-size: 13px; font-weight: 600;
            color: #374151; margin-bottom: 7px;
        }
        .form-label .required { color: #ef4444; margin-left: 3px; }

        .form-input, .form-textarea {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 14px; font-family: 'Be Vietnam Pro', sans-serif;
            color: #1e293b; background: #f8fafc;
            outline: none; transition: all 0.25s ease;
            appearance: none; -webkit-appearance: none;
        }
        .form-input::placeholder, .form-textarea::placeholder {
            color: #94a3b8;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: #22c55e;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
        }
        .form-input.error, .form-textarea.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
        .form-textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

        .form-error {
            font-size: 12px; color: #ef4444; margin-top: 5px;
            display: flex; align-items: center; gap: 4px;
        }

        /* ===== SUBMIT BUTTON ===== */
        .btn-submit {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 13px 32px; border-radius: 25px;
            font-size: 14px; font-weight: 700;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff; border: none; cursor: pointer;
            box-shadow: 0 4px 16px rgba(34,197,94,0.35);
            transition: all 0.25s ease;
            text-decoration: none;
        }
        .btn-submit:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 24px rgba(34,197,94,0.45);
        }
        .btn-submit:active { transform: translateY(0) scale(0.99); }

        /* ===== BACK LINK ===== */
        .btn-back {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 11px 20px; border-radius: 25px;
            font-size: 13px; font-weight: 600;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #f1f5f9; color: #64748b; border: none;
            cursor: pointer; text-decoration: none;
            transition: all 0.25s ease;
        }
        .btn-back:hover {
            background: #e2e8f0; color: #475569;
            transform: translateX(-2px);
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: #94a3b8; margin-bottom: 20px;
        }
        .breadcrumb a { color: #3b82f6; text-decoration: none; font-weight: 500; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: #64748b; font-weight: 500; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .page-content { padding: 20px 16px; }
            .form-card { padding: 24px 20px; }
            .btn-submit, .btn-back { width: 100%; justify-content: center; }
        }
    </style>
</head>

<body>
<div th:replace="admin/fragments/header :: header_nav"></div>
<div id="layoutSidenav">
    <div th:replace="admin/fragments/side_navbar :: side_navbar"></div>
    <div id="layoutSidenav_content">
        <main class="page-content">
            <!-- Breadcrumb -->
            <div class="breadcrumb">
                <a th:href="@{/admin}">
                    <i class="fas fa-home"></i> Trang chủ
                </a>
                <i class="fas fa-chevron-right" style="font-size:10px;"></i>
                <a th:href="@{/admin/categories_management}">Danh mục</a>
                <i class="fas fa-chevron-right" style="font-size:10px;"></i>
                <span th:text="${category.id != null} ? 'Cập nhật danh mục' : 'Thêm danh mục'"></span>
            </div>

            <!-- Alert -->
            <div class="alert-custom alert-custom--success" th:if="${message}">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}"></span>
            </div>

            <!-- Page Header -->
            <div class="page-header">
                <div class="page-header__icon">
                    <i class="fas" th:classappend="${category.id != null} ? 'fa-edit' : 'fa-plus'"></i>
                </div>
                <div>
                    <h1 class="page-header__title" th:text="${category.id != null} ? 'Cập nhật danh mục' : 'Thêm danh mục mới'"></h1>
                    <p class="page-header__sub" th:text="${category.id != null} ? 'Chỉnh sửa thông tin danh mục' : 'Tạo danh mục sản phẩm mới cho hệ thống'"></p>
                </div>
            </div>

            <!-- Form Card -->
            <div class="form-card">
                <div class="form-card__title">
                    <i class="fas" th:classappend="${category.id != null} ? 'fa-edit' : 'fa-plus'"></i>
                    <span th:text="${category.id != null} ? 'Cập nhật danh mục' : 'Thông tin danh mục mới'"></span>
                </div>

                <form method="post" th:action="@{/admin/categories_management/add_or_update}" th:object="${category}">
                    <!-- Hidden ID -->
                    <input th:field="*{id}" type="hidden"/>

                    <!-- Tên danh mục -->
                    <div class="form-group">
                        <label class="form-label">
                            Tên danh mục <span class="required">*</span>
                        </label>
                        <input
                            class="form-input"
                            th:field="*{name}"
                            type="text"
                            placeholder="Ví dụ: Trái cây tươi, Rau xanh,..."
                            required
                        />
                    </div>

                    <!-- Mô tả -->
                    <div class="form-group">
                        <label class="form-label">Mô tả danh mục</label>
                        <textarea
                            class="form-textarea"
                            th:field="*{description}"
                            placeholder="Nhập mô tả ngắn gọn về danh mục này..."
                            rows="5"
                        ></textarea>
                    </div>

                    <!-- Buttons -->
                    <div style="display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;">
                        <button class="btn-submit" type="submit">
                            <i class="fas" th:classappend="${category.id != null} ? 'fa-save' : 'fa-plus'"></i>
                            <span th:text="${category.id != null} ? 'Lưu thay đổi' : 'Thêm danh mục'"></span>
                        </button>
                        <a class="btn-back" th:href="@{/admin/categories_management}">
                            <i class="fas fa-arrow-left"></i> Quay lại
                        </a>
                    </div>
                </form>
            </div>
        </main>
        <div th:replace="admin/fragments/footer :: footer"></div>
    </div>
</div>

<script crossorigin="anonymous" th:src="@{/js/admin/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/admin/scripts.js}"></script>
</body>
</html>
